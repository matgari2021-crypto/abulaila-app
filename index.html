<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الكاشير الذكي | إدارة المطعم</title>
    <style>
        :root {
            --primary: #e67e22;
            --bg: #14141b;
            --card-bg: #1d1d29;
            --text: #ffffff;
            --text-muted: #a0a0b0;
            --border: #2d2d3f;
            --success: #2ecc71;
            --danger: #e74c3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; }
        
        .pos-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        @media (max-width: 1024px) {
            .pos-container { grid-template-columns: 1fr; }
        }

        /* القسم الأيمن: المجموعات والأصناف */
        .menu-section { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        .categories { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .cat-btn {
            background: #28283a; color: var(--text); border: 1px solid var(--border);
            padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s;
        }
        .cat-btn.active, .cat-btn:hover { background: var(--primary); border-color: var(--primary); }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .product-card {
            background: #232334; border: 1px solid var(--border); border-radius: 10px; padding: 15px;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .product-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .product-icon { font-size: 35px; margin-bottom: 10px; }
        .product-name { font-weight: bold; margin-bottom: 8px; font-size: 15px; }
        .product-price { color: var(--primary); font-weight: bold; font-size: 16px; }

        /* القسم الأيسر: السلة والفاتورة */
        .cart-section {
            background: var(--card-bg); border-radius: 12px; padding: 20px;
            border: 1px solid var(--border); display: flex; flex-direction: column; height: calc(100vh - 40px); min-height: 600px;
        }
        .cart-section h2 { font-size: 20px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border); color: var(--primary); }
        
        .cart-items { flex: 1; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #232334; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border);
        }
        .item-details { flex: 1; }
        .item-title { font-weight: bold; font-size: 14px; }
        .item-cost { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
        
        .qty-controls { display: flex; align-items: center; gap: 8px; margin-left: 10px; }
        .qty-btn {
            background: #2f2f44; color: white; border: none; width: 28px; height: 28px;
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: center;
        }
        .qty-btn:hover { background: var(--primary); }
        .qty-val { font-weight: bold; min-width: 20px; text-align: center; }
        .del-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; margin-left: 5px; }

        /* الحسابات المالية */
        .summary-box { border-top: 2px dashed var(--border); padding-top: 15px; margin-bottom: 15px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        .summary-row.total { font-size: 18px; font-weight: bold; color: var(--success); margin-top: 5px; border-top: 1px solid var(--border); padding-top: 8px; }
        
        .discount-input-box { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .discount-input-box label { font-size: 13px; color: var(--text-muted); }
        .discount-input {
            background: #232334; border: 1px solid var(--border); color: white;
            padding: 5px 10px; border-radius: 5px; width: 80px; text-align: center;
        }

        /* أزرار التحكم */
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            padding: 12px; border: none; border-radius: 8px; font-weight: bold;
            font-size: 15px; cursor: pointer; transition: 0.2s; text-align: center;
        }
        .btn-new { background: #34495e; color: white; }
        .btn-new:hover { background: #2c3e50; }
        .btn-print { background: var(--success); color: white; }
        .btn-print:hover { background: #27ae60; }

        /* تنسيق الطباعة فقط */
        @media print {
            body * { visibility: hidden; }
            .cart-section, .cart-section * { visibility: visible; }
            .cart-section { position: absolute; left: 0; top: 0; width: 100%; height: auto; background: white; color: black; border: none; }
            .qty-btn, .del-btn, .discount-input-box, .action-btns, h2 { display: none !important; }
            .cart-item { background: none; border-bottom: 1px solid #ccc; color: black; }
            .summary-row { color: black; }
            .summary-row.total { color: black; border-top: 2px solid black; }
        }
    </style>
</head>
<body>

<div class="pos-container">
    
    <!-- القسم الأيمن: المجموعات والمنيو -->
    <div class="menu-section">
        <div class="categories">
            <button class="cat-btn active" onclick="switchCategory('grill')">🍖 مشويات</button>
            <button class="cat-btn" onclick="switchCategory('drinks')">🥤 مشروبات</button>
        </div>
        
        <div class="products-grid" id="products-container">
            <!-- سيتم تحميل الأصناف تلقائياً عبر الجافاسكريبت هنا -->
        </div>
    </div>

    <!-- القسم الأيسر: السلة وتفاصيل الفاتورة -->
    <div class="cart-section" id="invoice">
        <h2>🛒 سلة طلبات الفاتورة</h2>
        
        <div class="cart-items" id="cart-items-container">
            <!-- عناصر السلة المضافة تظهر هنا -->
            <p style="text-align: center; color: var(--text-muted); margin-top: 50px;" id="empty-msg">السلة فارغة، اختر الأصناف لبدء الفاتورة</p>
        </div>

        <div class="discount-input-box">
            <label>قيمة الخصم (ر.س):</label>
            <input type="number" class="discount-input" id="discount-field" value="0" min="0" oninput="updateCalculations()">
        </div>

        <div class="summary-box">
            <div class="summary-row"><span>الإجمالي (قبل الضريبة):</span><span id="subtotal">0.00 ر.س</span></div>
            <div class="summary-row"><span>الضريبة (15%):</span><span id="tax">0.00 ر.س</span></div>
            <div class="summary-row"><span>الخصم المطبق:</span><span id="discount-val">0.00 ر.س</span></div>
            <div class="summary-row total"><span>صافي الفاتورة:</span><span id="grand-total">0.00 ر.س</span></div>
        </div>

        <div class="action-btns">
            <button class="btn btn-new" onclick="clearInvoice()">فاتورة جديدة</button>
            <button class="btn btn-print" onclick="printInvoice()">حفظ وطباعة</button>
        </div>
    </div>

</div>

<script>
    // قاعدة بيانات الأصناف المستخرجة والمصنفة
    const menuData = {
        grill: [
            { id: 1, name: 'كباب لحم فاخر', price: 45.00, icon: '🍢' },
            { id: 2, name: 'شيش طاووق دجاج', price: 38.00, icon: '🍗' },
            { id: 3, name: 'أوصال لحم مشوي', price: 42.00, icon: '🥩' },
            { id: 4, name: 'مشوي مشكل (نفر)', price: 55.00, icon: '🍽️' }
        ],
        drinks: [
            { id: 5, name: 'عصير برتقال طازج', price: 12.00, icon: '🍊' },
            { id: 6, name: 'مشروب غازي متنوع', price: 5.00, icon: '🥤' },
            { id: 7, name: 'ماء صحي صغير', price: 1.50, icon: '💧' }
        ]
    };

    let cart = [];

    // عرض الأصناف بناءً على القسم المختار
    function switchCategory(cat) {
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        const container = document.getElementById('products-container');
        container.innerHTML = '';
        
        menuData[cat].forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => addToCart(prod);
            card.innerHTML = `
                <div class="product-icon">${prod.icon}</div>
                <div class="product-name">${prod.name}</div>
                <div class="product-price">${prod.price.toFixed(2)} ر.س</div>
            `;
            container.appendChild(card);
        });
    }

    // إضافة صنف إلى السلة
    function addToCart(product) {
        const existing = cart.find(item => item.id === product.id);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ ...product, qty: 1 });
        }
        renderCart();
    }

    // تغيير الكميات (+ أو -)
    function changeQty(id, amount) {
        const item = cart.find(item => item.id === id);
        if (item) {
            item.qty += amount;
            if (item.qty <= 0) {
                cart = cart.filter(i => i.id !== id);
            }
        }
        renderCart();
    }

    // حذف صنف بالكامل من السلة
    function deleteItem(id) {
        cart = cart.filter(item => item.id !== id);
        renderCart();
    }
